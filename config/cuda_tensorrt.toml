# CUDA + TensorRT Benchmark Configuration
# Optimized for NVIDIA RTX 3060 Laptop GPU

[server]
host = "0.0.0.0"
port = 8000
log_level = "info"
workers = 8  # Adjusted for GPU workload

[device]
device_type = "cuda"  # Force CUDA GPU
device_id = 0  # RTX 3060 (first GPU)
use_fp16 = true  # Enable FP16 for 2x throughput
use_tensorrt = true  # Enable TensorRT optimization
use_torch_compile = true  # Enable torch.compile
enable_jit = true
enable_jit_profiling = true
enable_jit_executor = true
enable_jit_fusion = true

# TensorRT-specific settings
tensorrt_precision = "int8"  # Options: fp32, fp16, int8
tensorrt_workspace_size_mb = 2048  # 2GB workspace
tensorrt_max_batch_size = 32
tensorrt_min_timing_iterations = 2
tensorrt_avg_timing_iterations = 4
tensorrt_calibration_batch_size = 32
tensorrt_dla_core = -1  # -1 = disabled, 0/1 for Jetson DLA
tensorrt_strict_types = false  # Allow kernel auto-tuning

# CUDA optimization
cudnn_benchmark = true  # Enable cuDNN auto-tuner
cudnn_deterministic = false  # Allow non-deterministic ops for speed
cuda_graphs_enabled = true  # Enable CUDA graphs
cuda_memory_fraction = 0.9  # Use 90% of 6GB VRAM (5.4GB)

# PyTorch/LibTorch optimizations
num_threads = 8  # CPU threads
num_interop_threads = 4
enable_autocast = true  # Automatic Mixed Precision
torch_warmup_iterations = 20  # Extra warmup for TensorRT

[batch]
batch_size = 1  # Start with single image
max_batch_size = 32  # Allow batching up to 32
enable_dynamic_batching = true  # Enable for throughput

[performance]
# Warmup (critical for TensorRT)
warmup_iterations = 20  # TensorRT needs more warmup

# Profiling
enable_profiling = true  # Enable for benchmark analysis
profiler_output_dir = "./benchmark_results/cuda_profiles"

# Caching
enable_caching = true
cache_size_mb = 1024  # 1GB cache

# Batching
enable_request_batching = true
adaptive_batch_timeout = true
min_batch_size = 1
batch_timeout_ms = 10  # 10ms timeout for batching

# Inflight batching
enable_inflight_batching = true
max_inflight_batches = 4

# Worker pool
enable_worker_pool = true
min_workers = 4
max_workers = 16
enable_auto_scaling = true

# Memory optimizations
enable_tensor_pooling = true
max_pooled_tensors = 500
enable_memory_pool = true
memory_pool_size_mb = 4096  # 4GB memory pool

# Model loading
enable_async_model_loading = true
preload_models_on_startup = true

# Network
enable_result_compression = false  # No compression for benchmark

# Advanced GPU features
enable_model_quantization = true
quantization_bits = 8  # INT8 quantization
enable_cuda_graphs = true
enable_persistent_kernels = true  # Keep kernels loaded
enable_multi_stream = true  # Use multiple CUDA streams
num_cuda_streams = 4  # 4 concurrent streams

# TensorRT-specific optimizations
tensorrt_optimization_level = 5  # Max optimization (0-5)
tensorrt_enable_fp16 = true
tensorrt_enable_int8 = true
tensorrt_refit_mode = false  # Don't allow weight updates
tensorrt_sparse_weights = false  # Enable if model supports sparsity

[auth]
enabled = false  # Disabled for benchmark

[models]
auto_load = []
cache_dir = "models"
max_loaded_models = 20
instances_per_model = 1  # Single instance per model for GPU

[guard]
enable_guards = false  # Disabled for benchmark
max_memory_mb = 5400  # 90% of 6GB VRAM
max_requests_per_second = 10000
max_queue_depth = 1000
enable_circuit_breaker = false

[sanitizer]
max_text_length = 10000
sanitize_text = false
sanitize_image_dimensions = false
max_image_width = 4096
max_image_height = 4096

# GPU-specific monitoring
[monitoring]
enable_gpu_monitoring = true
gpu_poll_interval_ms = 100
track_gpu_utilization = true
track_gpu_memory = true
track_gpu_temperature = true
track_gpu_power = true
alert_on_gpu_memory_threshold = 90  # Alert at 90% VRAM usage
alert_on_gpu_temp_threshold = 85  # Alert at 85°C

# CUDA-specific tunables
[cuda]
malloc_async = true  # Use async allocator
max_split_size_mb = 512  # Fragmentation threshold
garbage_collection_threshold = 0.8  # GC at 80% usage
expandable_segments = true  # Allow memory expansion

# Torch Inference Server - High Concurrency Optimized Configuration
# Optimized for near-linear scaling up to 64 concurrent requests

[server]
host = "0.0.0.0"
port = 8000
log_level = "info"
workers = 16  # Increased from 8 to handle more concurrent connections

[device]
device_type = "cuda"  # Force CUDA GPU usage
device_id = 0  # Use first CUDA device (RTX 3060)
use_fp16 = true  # Enable FP16 for better GPU performance
use_tensorrt = true  # Enable TensorRT optimization
use_torch_compile = true  # Enable torch.compile for optimization
enable_jit = true  # Enable JIT compilation for better performance
enable_jit_profiling = true
enable_jit_executor = true
enable_jit_fusion = true

# Metal-specific optimizations
metal_use_mlx = true
metal_cache_shaders = true
metal_optimize_for_apple_silicon = true

# PyTorch/LibTorch Optimizations
num_threads = 8  # CPU threads for data loading
num_interop_threads = 4  # Increased for better parallelism
cudnn_benchmark = true  # Enable cuDNN auto-tuner for optimal kernels
enable_autocast = true  # Enable automatic mixed precision (AMP)
torch_warmup_iterations = 20  # More warmup for TensorRT optimization

[batch]
batch_size = 1
max_batch_size = 8  # Smaller batches for lower latency
enable_dynamic_batching = false  # Disabled to reduce coordination overhead

[performance]
# Warmup
warmup_iterations = 10

# Profiling
enable_profiling = false

# === Caching - ENABLED with RwLock optimization ===
enable_caching = true  # Now uses RwLock for concurrent reads
cache_size_mb = 512  # 512MB cache

# === Batching - DISABLED for low overhead ===
enable_request_batching = false  # Disabled for minimal coordination
adaptive_batch_timeout = false
min_batch_size = 1

# Inflight Batching - DISABLED
enable_inflight_batching = false
max_inflight_batches = 1

# Worker Pool - OPTIMIZED
enable_worker_pool = true
min_workers = 16  # Match server workers
max_workers = 64  # Allow scaling to 64
enable_auto_scaling = true
enable_zero_scaling = false

# === Memory Optimizations ===
enable_tensor_pooling = true  # Keep enabled for memory reuse
max_pooled_tensors = 1000  # Increased pool size

# === Model Loading ===
enable_async_model_loading = true
preload_models_on_startup = true  # Preload to avoid lazy loading delays

# === Network - DISABLED for minimal overhead ===
enable_result_compression = false  # No compression overhead
compression_level = 0

# === Advanced - ENABLED FOR GPU ===
enable_model_quantization = true  # Enable quantization for TensorRT
quantization_bits = 8  # INT8 quantization for maximum performance
enable_cuda_graphs = true  # Enable CUDA graphs for reduced overhead
tensorrt_precision = "int8"  # Options: fp32, fp16, int8
tensorrt_workspace_size_mb = 2048  # 2GB workspace for TensorRT
tensorrt_max_batch_size = 32  # Maximum batch size for TensorRT optimization

[auth]
enabled = false  # Disabled for benchmark
jwt_secret = "benchmark-secret-key"
jwt_algorithm = "HS256"
access_token_expire_minutes = 60
refresh_token_expire_days = 7

[models]
auto_load = ["example"]
cache_dir = "models"
max_loaded_models = 10  # Increased to support more models
instances_per_model = 8  # NEW: Create 8 model replicas for parallel inference

[guard]
enable_guards = false  # Disabled for benchmark
max_memory_mb = 16384
max_requests_per_second = 10000  # Increased limit
max_queue_depth = 2000  # Increased queue
min_cache_hit_rate = 0.0
max_error_rate = 10.0
enable_circuit_breaker = false  # Disabled for benchmark
enable_auto_mitigation = false

[sanitizer]
max_text_length = 10000
sanitize_text = false  # Disabled for performance
sanitize_image_dimensions = false
max_image_width = 4096
max_image_height = 4096
round_probabilities = false
probability_decimals = 4
remove_null_values = false

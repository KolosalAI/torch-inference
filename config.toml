# Torch Inference Server - Optimized Configuration
# This configuration enables all performance optimizations

[server]
host = "0.0.0.0"
port = 8000
log_level = "info"
workers = 8  # Auto-detected based on CPU cores

[device]
# Device configuration
device_type = "auto"  # Options: auto, cuda, cpu, metal, mps
device_id = 0
use_fp16 = true  # Enable for 2x speedup on compatible GPUs
use_tensorrt = false  # TensorRT optimization (NVIDIA only)
use_torch_compile = true  # PyTorch 2.0 compilation
enable_jit = true  # Enable JIT compilation
enable_jit_profiling = false
enable_jit_executor = true
enable_jit_fusion = true

# Metal-specific optimizations (macOS/Apple Silicon)
metal_use_mlx = false  # Use Apple MLX framework (experimental)
metal_cache_shaders = true  # Cache Metal shaders for faster startup
metal_optimize_for_apple_silicon = true  # Enable Apple Silicon specific optimizations

# PyTorch/LibTorch Optimizations
num_threads = 8  # Intra-op threads (set to num_cpus for best performance)
num_interop_threads = 1  # Inter-op threads (1 for serving workloads)
cudnn_benchmark = true  # Auto-select fastest cuDNN algorithms (stable input shapes)
enable_autocast = true  # Mixed precision (AMP) for faster inference
torch_warmup_iterations = 5  # Warmup iterations for stable latency

[batch]
# Batching configuration
batch_size = 1
max_batch_size = 32  # Maximum batch size for inference
enable_dynamic_batching = true  # Enable dynamic batching

[performance]
# === Core Performance Settings ===

# Warmup
warmup_iterations = 3  # Number of warmup iterations on startup

# Profiling
enable_profiling = false  # Enable performance profiling (use in dev only)

# === Caching Optimizations ===
enable_caching = true  # Enable LRU cache with automatic eviction
cache_size_mb = 2048  # Cache size in megabytes (2GB default)

# === Batching Optimizations ===
enable_request_batching = true  # Enable request batching
adaptive_batch_timeout = true  # Adaptive timeout based on queue depth
min_batch_size = 1  # Minimum batch size before processing

# Inflight Batching (Advanced)
enable_inflight_batching = false  # Allow batching while inference is running
max_inflight_batches = 4  # Maximum concurrent batches in processing

# Worker Pool Management
enable_worker_pool = true  # Enable managed worker pool
min_workers = 2  # Minimum number of workers
max_workers = 16  # Maximum number of workers
enable_auto_scaling = true  # Auto-scale workers based on load
enable_zero_scaling = false # Allow scaling down to zero workers

# === Memory Optimizations ===
enable_tensor_pooling = true  # Reuse tensor memory (50-70% faster allocation)
max_pooled_tensors = 500  # Maximum number of pooled tensors per shape

# === Model Loading Optimizations ===
enable_async_model_loading = true  # Load models asynchronously
preload_models_on_startup = false  # Pre-load all auto_load models at startup

# === Network Optimizations ===
enable_result_compression = true  # Compress large responses with gzip
compression_level = 6  # Compression level (1=fast, 9=best, 6=balanced)

# === Advanced Optimizations ===
enable_model_quantization = true  # Enable model quantization (experimental)
quantization_bits = 8  # Quantization bits (8 or 16)
enable_cuda_graphs = true  # CUDA graphs for lower latency (NVIDIA only)

[auth]
# Authentication configuration
enabled = true
jwt_secret = "your-secret-key-here-change-in-production"
jwt_algorithm = "HS256"
access_token_expire_minutes = 60
refresh_token_expire_days = 7

[models]
# Model management
auto_load = ["example"]  # Models to auto-load on startup
cache_dir = "models"  # Directory for model cache
max_loaded_models = 5  # Maximum number of models to keep in memory

[guard]
# System Guards - Protection & Auto-Mitigation
enable_guards = true  # Enable system guards
max_memory_mb = 8192  # Maximum memory usage (8GB)
max_requests_per_second = 1000  # Rate limit
max_queue_depth = 500  # Maximum queue size
min_cache_hit_rate = 60.0  # Minimum cache hit rate (%)
max_error_rate = 5.0  # Maximum error rate (%)
enable_circuit_breaker = true  # Enable circuit breaker
enable_auto_mitigation = true  # Enable automatic mitigation


# ===================================================================
# PERFORMANCE PROFILES
# ===================================================================
# Uncomment the profile that matches your use case:

# --- HIGH THROUGHPUT (Batch Processing) ---
# [batch]
# max_batch_size = 64
# 
# [performance]
# cache_size_mb = 4096
# max_pooled_tensors = 500
# adaptive_batch_timeout = true
# min_batch_size = 8
# enable_result_compression = true
# compression_level = 6

# --- LOW LATENCY (Real-time APIs) ---
# [batch]
# max_batch_size = 8
# 
# [performance]
# cache_size_mb = 1024
# max_pooled_tensors = 100
# adaptive_batch_timeout = true
# min_batch_size = 1
# enable_result_compression = false  # Skip compression for speed

# --- MEMORY CONSTRAINED (Edge/Containers) ---
# [performance]
# cache_size_mb = 512
# max_pooled_tensors = 50
# enable_result_compression = true
# compression_level = 9
# enable_model_quantization = true
# quantization_bits = 8
# 
# [models]
# max_loaded_models = 3

# ===================================================================
# OPTIMIZATION NOTES
# ===================================================================
#
# 1. Caching (LRU Cache):
#    - Automatic eviction of least-recently-used entries
#    - Typical hit rate: 80-85%
#    - Memory formula: (request_rate * avg_response_kb * TTL) / 1024
#
# 2. Adaptive Batching:
#    - Timeout adjusts based on queue depth:
#      * 0-2 items: 100ms
#      * 3-5 items: 50ms
#      * 6-10 items: 25ms
#      * 11+ items: 12.5ms
#    - 2-4x throughput increase under load
#
# 3. Tensor Pooling:
#    - Reuses pre-allocated tensors
#    - 50-70% reduction in allocation overhead
#    - Typical reuse rate: 95%+
#
# 4. Result Compression:
#    - gzip compression for responses > 1KB
#    - 60-90% bandwidth reduction
#    - Level 6 = balanced (recommended)
#    - Level 1 = fast (low CPU)
#    - Level 9 = best compression (high CPU)
#
# 5. Model Pooling:
#    - Multiple instances per model
#    - Parallel inference
#    - Round-robin load balancing
#
# 6. Metal/Apple Silicon Optimizations:
#    - Unified memory architecture (GPU shares system RAM)
#    - metal_optimize_for_apple_silicon: Enables Apple-specific optimizations
#    - metal_cache_shaders: Caches Metal shaders for faster startup
#    - Optimal thread count: 75% of available cores (E+P cores)
#    - FP16 on Metal: 1.5-2x speedup but may have compatibility issues
#    - Recommended: Keep FP32 for production, use FP16 for testing
#
# ===================================================================
# MONITORING
# ===================================================================
#
# View performance metrics:
#
# Cache stats:
#   curl http://localhost:8000/api/stats/cache
#
# Batch stats:
#   curl http://localhost:8000/api/stats/batch
#
# Tensor pool stats:
#   curl http://localhost:8000/api/stats/tensor_pool
#
# ===================================================================
# TROUBLESHOOTING
# ===================================================================
#
# High memory usage:
#   - Reduce cache_size_mb
#   - Lower max_pooled_tensors
#   - Enable enable_model_quantization
#
# Low cache hit rate:
#   - Increase cache_size_mb
#   - Check if requests are cacheable
#   - Monitor cache stats
#
# Slow response times:
#   - Enable adaptive_batch_timeout
#   - Reduce min_batch_size
#   - Check queue depth in batch stats
#
# ===================================================================
